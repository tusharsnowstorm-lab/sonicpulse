<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg-i" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#060318"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="glow-i" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-i" cx="55%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-i">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg-i)"/>

  <!-- Glow blobs -->
  <ellipse cx="400" cy="350" rx="360" ry="300" fill="url(#glow-i)" filter="url(#blur-i)"/>
  <ellipse cx="500" cy="640" rx="280" ry="180" fill="url(#spot-i)" filter="url(#blur-i)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#7B2FFF" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="640" y1="0" x2="640" y2="800"/>
  </g>

  <!-- Diamond shape -->
  <polygon points="400,120 660,400 400,680 140,400" fill="none" stroke="#7B2FFF" stroke-opacity="0.12" stroke-width="1.5"/>
  <polygon points="400,200 580,400 400,600 220,400" fill="none" stroke="#7B2FFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Corner dots -->
  <circle cx="140" cy="400" r="5" fill="#7B2FFF" opacity="0.4"/>
  <circle cx="660" cy="400" r="5" fill="#7B2FFF" opacity="0.4"/>
  <circle cx="400" cy="120" r="5" fill="#00F0FF" opacity="0.4"/>
  <circle cx="400" cy="680" r="5" fill="#00F0FF" opacity="0.4"/>

  <!-- Artist name -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" letter-spacing="-2" fill="#F0F0F8" opacity="0.95">ISHAQO</text>

  <!-- Accent underline -->
  <rect x="190" y="448" width="420" height="3" fill="#7B2FFF" opacity="0.8" rx="2"/>

  <!-- Genre tag -->
  <text x="400" y="498" text-anchor="middle" font-family="monospace" font-size="18" letter-spacing="8" fill="#9B5FFF" opacity="0.75">HEADLINER · MAIN STAGE</text>
</svg>