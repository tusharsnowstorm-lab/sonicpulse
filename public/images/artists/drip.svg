<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg-d" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00101a"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="glow-d" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-d" cx="30%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#CCFF00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#CCFF00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-d">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg-d)"/>

  <!-- Glow blobs -->
  <ellipse cx="400" cy="380" rx="340" ry="280" fill="url(#glow-d)" filter="url(#blur-d)"/>
  <ellipse cx="250" cy="600" rx="240" ry="180" fill="url(#spot-d)" filter="url(#blur-d)"/>

  <!-- Horizontal scan lines -->
  <g opacity="0.04" stroke="#00F0FF" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
  </g>

  <!-- Drip drops - abstract geometric -->
  <ellipse cx="400" cy="240" rx="20" ry="28" fill="#00F0FF" opacity="0.15"/>
  <polygon points="380,262 420,262 400,310" fill="#00F0FF" opacity="0.12"/>
  <ellipse cx="400" cy="240" rx="8" ry="11" fill="#00F0FF" opacity="0.35"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="310" fill="none" stroke="#00F0FF" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="#00F0FF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Tick marks on ring -->
  <g stroke="#00F0FF" stroke-width="1.5" opacity="0.2">
    <line x1="400" y1="90" x2="400" y2="105"/>
    <line x1="400" y1="695" x2="400" y2="710"/>
    <line x1="90" y1="400" x2="105" y2="400"/>
    <line x1="695" y1="400" x2="710" y2="400"/>
  </g>

  <!-- Artist name -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="180" letter-spacing="4" fill="#F0F0F8" opacity="0.95">DRIP</text>

  <!-- Accent underline -->
  <rect x="200" y="476" width="400" height="3" fill="#00F0FF" opacity="0.65" rx="2"/>

  <!-- Genre tag -->
  <text x="400" y="524" text-anchor="middle" font-family="monospace" font-size="18" letter-spacing="8" fill="#00F0FF" opacity="0.65">HEADLINER · MAIN STAGE</text>
</svg>