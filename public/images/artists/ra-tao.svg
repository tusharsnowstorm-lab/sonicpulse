<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#150010"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FF3FC2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FF3FC2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="32"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="400" rx="340" ry="280" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Concentric diamond shapes -->
  <polygon points="400,120 680,400 400,680 120,400" fill="none" stroke="#FF3FC2" stroke-opacity="0.06" stroke-width="1"/>
  <polygon points="400,200 600,400 400,600 200,400" fill="none" stroke="#FF3FC2" stroke-opacity="0.08" stroke-width="1"/>
  <polygon points="400,280 520,400 400,520 280,400" fill="none" stroke="#FF3FC2" stroke-opacity="0.11" stroke-width="1.5"/>
  <line x1="120" y1="400" x2="680" y2="400" stroke="#FF3FC2" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="120" x2="400" y2="680" stroke="#FF3FC2" stroke-opacity="0.04" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="130" letter-spacing="-2" fill="#F0F0F8" opacity="0.95">RA</text>
  <text x="400" y="500" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="130" letter-spacing="6" fill="#FF3FC2" opacity="0.9">TAO</text>
  <rect x="230" y="516" width="340" height="3" fill="#FF3FC2" opacity="0.5" rx="2"/>
  <text x="400" y="556" text-anchor="middle" font-family="monospace" font-size="15" letter-spacing="7" fill="#FF3FC2" opacity="0.6">MAIN STAGE</text>
</svg>
