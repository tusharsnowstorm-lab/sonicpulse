  <line x1="0" y1="540" x2="800" y2="540" stroke="#00D4A0" stroke-opacity="0.03" stroke-width="1"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="#00D4A0" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="400" cy="400" r="160" fill="none" stroke="#FF3FC2" stroke-opacity="0.05" stroke-width="1"/>
  <text x="400" y="455" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="200" letter-spacing="10" fill="#F0F0F8" opacity="0.95">RII</text>
