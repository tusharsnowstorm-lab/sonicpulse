<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="40%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#001510"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="glow1" cx="40%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00D4A0" stop-opacity="0.14"/>
