    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#FF3FC2" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FF3FC2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="340" cy="480" rx="300" ry="240" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse cx="520" cy="300" rx="240" ry="200" fill="url(#glow2)" filter="url(#blur)"/>
